# Render Blueprint Specification

databases:
  # 1. PostgreSQL Database Service
  - name: xeno-db
    databaseName: xeno_crm
    plan: free

services:
  # 2. CRM Backend Web Service (Express API)
  - type: web
    name: xeno-backend
    plan: free
    env: node
    buildCommand: "cd backend && npm install && npx prisma generate && npm run build"
    startCommand: "cd backend && node wait-db.js && npx prisma db push && npm run prisma:seed && npm start"
    envVars:
      - key: PORT
        value: 5005
      - key: DATABASE_URL
        fromDatabase:
          name: xeno-db
          property: connectionString
      - key: CHANNEL_SERVICE_URL
        fromService:
          name: xeno-channel-service
          type: web
          property: host
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Gemini API Key (Optional - falls back to local NLP parser)"

  # 3. Channel Service Web Service (Mock Outreach webhook sender)
  - type: web
    name: xeno-channel-service
    plan: free
    env: node
    buildCommand: "cd channel-service && npm install && npm run build"
    startCommand: "cd channel-service && npm start"
    envVars:
      - key: PORT
        value: 4000

  # 4. Next.js Frontend Web Service
  - type: web
    name: xeno-frontend
    plan: free
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: xeno-backend
          type: web
          property: host
