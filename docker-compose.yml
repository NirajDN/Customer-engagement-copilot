version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: xeno-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xeno_crm
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: xeno-backend
    restart: always
    environment:
      PORT: 5005
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/xeno_crm?schema=public"
      CHANNEL_SERVICE_URL: "http://channel-service:4000"
      CRM_BACKEND_URL: "http://backend:5005"
      GEMINI_API_KEY: "" # Put your Gemini API Key here if needed
    ports:
      - "5005:5005"
    depends_on:
      - db

  channel-service:
    build: ./channel-service
    container_name: xeno-channel-service
    restart: always
    environment:
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5005/api
    container_name: xeno-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
